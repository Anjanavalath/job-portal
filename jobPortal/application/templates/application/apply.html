{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 500px; padding: 2.5rem; border-radius: 20px; background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem;">Apply Now</h2>
            <p style="color: #64748b;">Submit your details for <strong>{{ job.title }}</strong></p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            {% for field in form %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #334155; margin-bottom: 0.5rem;">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    {% for error in field.errors %}
                        <p style="color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem;">{{ error }}</p>
                    {% endfor %}
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-primary-full" style="width: 100%; padding: 1rem; border-radius: 12px; font-weight: 700; background: #2563eb; color: white; border: none; cursor: pointer;">
                Submit Application
            </button>
        </form>
    </div>
</div>

<style>
    /* Ensure the Django form widgets match your style */
    input[type="text"], input[type="email"], input[type="file"] {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        background: #f8fafc;
    }
    input:focus {
        outline: none;
        border-color: #2563eb;
        background: #fff;
    }
</style>
{% endblock %}
