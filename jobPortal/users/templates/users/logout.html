{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 480px; padding: 3rem; text-align: center; border-radius: 24px; border: 1px solid #e2e8f0; background: #ffffff; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);">
        
        <div style="width: 80px; height: 80px; background: #f0fdf4; color: #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2rem; border: 4px solid #dcfce7;">
            <i class="fas fa-check"></i>
        </div>

        <h2 style="font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem;">Successfully Signed Out</h2>
        <p style="color: #64748b; font-size: 1rem; line-height: 1.6; margin-bottom: 2.5rem;">
            Thank you for using our platform. Your session has been securely ended.
        </p>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="{% url 'users:login' %}" class="btn-nav" style="text-decoration: none; padding: 1rem; border-radius: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span>Login Back In</span>
                <i class="fas fa-sign-in-alt"></i>
            </a>
            
            <a href="{% url 'core:home' %}" style="text-decoration: none; color: #475569; font-weight: 600; padding: 12px; font-size: 0.95rem; transition: color 0.2s;" onmouseover="this.style.color='#0f172a'" onmouseout="this.style.color='#475569'">
                <i class="fas fa-arrow-left" style="font-size: 0.8rem; margin-right: 4px;"></i> Return to Homepage
            </a>
        </div>

        <div style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #f1f5f9;">
            <p style="font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; justify-content: center; gap: 6px;">
                <i class="fas fa-shield-alt"></i> Safe & Secure Session
            </p>
        </div>
    </div>
</div>
{% endblock %}
